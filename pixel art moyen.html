<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Moyen</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <header>
        <h1>Les Pixel Art Moyen</h1>
        <a href="index.html" class="btn-retour">Retour</a>
    </header>

    <main class="gallery">
        <div class="pixel-card">
            <img src="image/glace byzzare.jpg" alt="Pixel Art Coeur">
        </div>
        <div class="pixel-card">
            <img src="image/planette.jpeg" alt="Pixel Art Etoile">
        </div>
        <div class="pixel-card">
            <img src="image/_ (5).jpeg" alt="Pixel Art Oeuf">
        </div>
        <div class="pixel-card">
            <img src="image/_ (6).jpeg" alt="Pixel Art Emoji">
        </div>
        <div class="pixel-card">
            <img src="image/_ (7).jpeg" alt="Pixel Art Attention">
        </div>
        <div class="pixel-card">
            <img src="image/Squid game.jpeg" alt="Pixel Art Coeur">
        </div>
        <div class="pixel-card">
            <img src="image/_ (8).jpeg" alt="Pixel Art Etoile">
        </div>
        <div class="pixel-card">
            <img src="image/_ (9).jpeg" alt="Pixel Art Oeuf">
        </div>
        <div class="pixel-card">
            <img src="image/_ (10).jpeg" alt="Pixel Art Emoji">
        </div>
        <div class="pixel-card">
            <img src="image/Loot Llama grid.jpeg" alt="Pixel Art Attention">
        </div>
        <div class="pixel-card">
            <img src="image/_ (11).jpeg" Pixel Art Coeur">
        </div>
        <div class="pixel-card">
            <img src="image/_ (12).jpeg" alt="Pixel Art Etoile">
        </div>
        <div class="pixel-card">
            <img src="image/_ (13).jpeg" alt="Pixel Art Oeuf">
        </div>
        <div class="pixel-card">
            <img src="image/_ (14).jpeg" alt="Pixel Art Emoji">
        </div>
        <div class="pixel-card">
            <img src="image/_ (15).jpeg" alt="Pixel Art Attention">
        </div>
        <div class="pixel-card">
            <img src="image/Miami heat.jpeg" alt="Pixel Art Coeur">
        </div>
        <div class="pixel-card">
            <img src="image/Zootopia.jpeg" alt="Pixel Art Etoile">
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Crée l'élément overlay et ajoute-le au body
            const overlay = document.createElement('div');
            overlay.classList.add('zoom-overlay');
            const zoomedImg = document.createElement('img');
            overlay.appendChild(zoomedImg);
            document.body.appendChild(overlay);

            // 2. Sélectionne toutes tes images dans .pixel-card
            const pixelImages = document.querySelectorAll('.pixel-card img');

            // 3. Ajoute un gestionnaire d'événement 'click' à chaque image
            pixelImages.forEach(img => {
                img.addEventListener('click', (e) => {
                    // Met à jour la source de l'image de l'overlay
                    zoomedImg.src = e.target.src;
                    zoomedImg.alt = e.target.alt;
                    // Affiche l'overlay
                    overlay.classList.add('active');
                    // Empêche le scroll sur la page principale
                    document.body.style.overflow = 'hidden';
                });
            });

            // 4. Ajoute un gestionnaire pour fermer l'overlay
            // (au clic n'importe où sur l'overlay)
            overlay.addEventListener('click', () => {
                overlay.classList.remove('active');
                // Réactive le scroll sur la page principale
                document.body.style.overflow = '';
            });

            // Permet aussi de fermer avec la touche Echap
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && overlay.classList.contains('active')) {
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
        });
    </script>

</body>

</html>
</main>

</body>

</html>
